            sqlite3 .claude/totonoe/knowledge.db "UPDATE review_findings SET resolved = 1;"
            set +e; .claude/totonoe/bin/query_knowledge.sh --type findings 2>/dev/null; test "$?" = "1"; set -e
            sqlite3 .claude/totonoe/knowledge.db "UPDATE review_findings SET resolved = 0;"
            sqlite3 .claude/totonoe/knowledge.db "PRAGMA foreign_keys=ON;
              INSERT OR REPLACE INTO review_rounds (job_name, round, overall_grade, critical_count, summary) VALUES ('pipe', 1, 'A', 1, 's');
              INSERT INTO review_findings (review_round_id, job_name, round, file, severity, title, reason)
