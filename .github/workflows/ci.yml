name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Validate shell syntax
        run: |
          bash -n setup.sh
          bash -n .claude/totonoe/bin/*.sh

      - name: Validate SQL migrations syntax
        run: |
          for f in .claude/totonoe/migrations/*.sql; do
            sqlite3 ":memory:" ".read ${f}" || { echo "FAIL: ${f}"; exit 1; }
          done

      - name: Validate JSON files
        run: |
          jq . .claude/settings.json >/dev/null
          jq . .claude/totonoe/schemas/judge.schema.json >/dev/null
          jq . .claude/totonoe/schemas/reviewer.schema.json >/dev/null

      - name: Smoke test setup and local runtime flow
        run: |
          target="$(mktemp -d)"
          ./setup.sh --target "${target}" --force

          test -f "${target}/.claude/agents/GENERIC-ENGINEER.md"
          test -f "${target}/.claude/agents/SECURITY-ENGINEER.md"
          test -f "${target}/.claude/agents/TEST-ENGINEER.md"
          test -f "${target}/.claude/agents/PERF-ENGINEER.md"
          test -f "${target}/.claude/agents/REFACTOR-ENGINEER.md"
          test -f "${target}/.env.example"

          (
            cd "${target}"
            .claude/totonoe/bin/init_job.sh --job-name smoke --goal-template feature_loop
            .claude/totonoe/bin/pause_job.sh --job-name smoke --reason "ci pause test"
            .claude/totonoe/bin/status.sh --job-name smoke --json >/dev/null
            .claude/totonoe/bin/resume_job.sh --job-name smoke
            printf 'summary\n' > .claude/totonoe/runtime/smoke/summary.md
            .claude/totonoe/bin/record_claude_round.sh \
              --job-name smoke \
              --summary-file .claude/totonoe/runtime/smoke/summary.md \
              --changed-file CLAUDE.totonoe.template.md \
              --quality-analyze passed \
              --quality-test skipped
            .claude/totonoe/bin/status.sh --job-name smoke --json --provider-state >/dev/null
          )

      - name: Smoke test knowledge DB initialization
        run: |
          target="$(mktemp -d)"
          ./setup.sh --target "${target}" --force
          (
            cd "${target}"

            # init_knowledge.sh で knowledge.db を作成する
            .claude/totonoe/bin/init_knowledge.sh

            # knowledge.db が作成されていること
            test -f .claude/totonoe/knowledge.db

            # schema_version が 1 であること
            ver="$(sqlite3 .claude/totonoe/knowledge.db 'SELECT MAX(version) FROM schema_version;')"
            test "${ver}" = "1"

            # 全テーブルが存在すること
            tables="$(sqlite3 .claude/totonoe/knowledge.db ".tables")"
            echo "${tables}" | grep -q "review_rounds"
            echo "${tables}" | grep -q "review_findings"
            echo "${tables}" | grep -q "verdicts"
            echo "${tables}" | grep -q "schema_version"

            # review_findings に resolved カラムが存在すること
            sqlite3 .claude/totonoe/knowledge.db "SELECT resolved FROM review_findings LIMIT 0;"

            # journal_mode が WAL であること
            mode="$(sqlite3 .claude/totonoe/knowledge.db 'PRAGMA journal_mode;')"
            test "${mode}" = "wal"

            # 冪等性: 再実行してもエラーにならないこと
            .claude/totonoe/bin/init_knowledge.sh

            # --force で再作成できること
            .claude/totonoe/bin/init_knowledge.sh --force
            ver2="$(sqlite3 .claude/totonoe/knowledge.db 'SELECT MAX(version) FROM schema_version;')"
            test "${ver2}" = "1"
          )

      - name: Smoke test shadow status generation
        run: |
          target="$(mktemp -d)"
          ./setup.sh --target "${target}" --force
          (
            cd "${target}"
            # shadow mode を有効にする
            jq '.reviewer.mode = "shadow"' .claude/totonoe/config.json > /tmp/_cfg.json && mv /tmp/_cfg.json .claude/totonoe/config.json

            .claude/totonoe/bin/init_job.sh --job-name shadow-smoke --goal-text "shadow ci test"
            printf 'summary\n' > .claude/totonoe/runtime/shadow-smoke/summary.md
            .claude/totonoe/bin/record_claude_round.sh \
              --job-name shadow-smoke \
              --summary-file .claude/totonoe/runtime/shadow-smoke/summary.md \
              --changed-file CLAUDE.totonoe.template.md \
              --quality-analyze passed \
              --quality-test skipped

            round_path=".claude/totonoe/runtime/shadow-smoke/rounds/001"

            # write_shadow_status の 3 パターンを検証する
            source .claude/totonoe/bin/common.sh
            write_shadow_status() {
              local rp="$1"; shift; local entries=("$@")
              if [ "${#entries[@]}" -eq 0 ]; then
                jq -n '{mode: "shadow", batches: []}' > "${rp}/reviewer_shadow_status.json"
                return
              fi
              printf '%s\n' "${entries[@]}" | jq -s '{mode: "shadow", batches: .}' > "${rp}/reviewer_shadow_status.json"
            }

            entries=()
            entries+=("$(jq -nc '{batch:"001",status:"success",provider:"gemini"}')")
            entries+=("$(jq -nc '{batch:"002",status:"skipped",reason:"primary_used_gemini_fallback"}')")
            entries+=("$(jq -nc '{batch:"003",status:"failed",reason:"shadow_execution_failed"}')")
            write_shadow_status "${round_path}" "${entries[@]}"

            sf="${round_path}/reviewer_shadow_status.json"
            test -f "${sf}"
            test "$(jq -r '.mode' "${sf}")" = "shadow"
            test "$(jq '.batches | length' "${sf}")" -eq 3
            test "$(jq -r '.batches[0].status' "${sf}")" = "success"
            test "$(jq -r '.batches[1].status' "${sf}")" = "skipped"
            test "$(jq -r '.batches[1].reason' "${sf}")" = "primary_used_gemini_fallback"
            test "$(jq -r '.batches[2].status' "${sf}")" = "failed"
            test "$(jq -r '.batches[2].reason' "${sf}")" = "shadow_execution_failed"
          )

      - name: Smoke test stale lock recovery (mkdir fallback)
        run: |
          target="$(mktemp -d)"
          ./setup.sh --target "${target}" --force
          (
            cd "${target}"
            export TOTONOE_FORCE_MKDIR_LOCK=1

            .claude/totonoe/bin/init_job.sh --job-name locktest --goal-text "lock ci test"

            lock_dir=".claude/totonoe/runtime/locktest/.job.lock.d"

            # 1. stale lock (dead PID) を作って次回取得で自動回収されることを確認
            mkdir -p "${lock_dir}"
            jq -nc '{pid: 99999999, hostname: "ci", created_at: "2025-01-01T00:00:00Z"}' > "${lock_dir}/owner.json"
            test -d "${lock_dir}"

            printf 'summary\n' > .claude/totonoe/runtime/locktest/summary.md
            .claude/totonoe/bin/record_claude_round.sh \
              --job-name locktest \
              --summary-file .claude/totonoe/runtime/locktest/summary.md \
              --changed-file CLAUDE.totonoe.template.md \
              --quality-analyze passed \
              --quality-test skipped

            status="$(.claude/totonoe/bin/status.sh --job-name locktest --json | jq -r '.status')"
            test "${status}" = "reviewing"
            test ! -d "${lock_dir}"

            # 2. live PID の lock は奪わないことを確認
            mkdir -p "${lock_dir}"
            jq -nc --argjson pid "$$" '{pid: $pid, hostname: "ci", created_at: "2025-01-01T00:00:00Z"}' > "${lock_dir}/owner.json"

            if timeout 3 bash -c "
              cd '${target}'
              export TOTONOE_FORCE_MKDIR_LOCK=1
              source .claude/totonoe/bin/common.sh
              acquire_job_lock locktest
            " 2>/dev/null; then
              echo 'FAIL: live PID lock was stolen' >&2
              exit 1
            fi
            rm -rf "${lock_dir}"

            # 3. metadata なしの新しい lock dir (grace period 内) は回収しないことを確認
            mkdir -p "${lock_dir}"
            # owner.json を置かない — grace period 内なので回収されないはず

            if timeout 3 bash -c "
              cd '${target}'
              export TOTONOE_FORCE_MKDIR_LOCK=1
              source .claude/totonoe/bin/common.sh
              acquire_job_lock locktest
            " 2>/dev/null; then
              echo 'FAIL: lock without metadata was reclaimed within grace period' >&2
              exit 1
            fi
            rm -rf "${lock_dir}"
          )
