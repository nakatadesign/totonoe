            for i in 1 2 3 4 5; do
              sqlite3 .claude/totonoe/knowledge.db "PRAGMA foreign_keys=ON; INSERT OR REPLACE INTO review_rounds (job_name, round, overall_grade, critical_count, summary) VALUES ('b', ${i}, 'A', 1, 't${i}');"
