              INSERT INTO review_rounds (job_name, round, overall_grade, critical_count, summary) VALUES ('lt', 1, 'A', 1, 'test');
              INSERT INTO review_findings (review_round_id, job_name, round, file, severity, title, reason) VALUES (1, 'lt', 1, 'a.ts', 'high', 'bug', 'reason');"
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT COUNT(*) FROM review_findings WHERE resolved = 0 AND job_name = "lt";')" = "1"
            .claude/totonoe/bin/learn.sh --job-name lt --lesson "テスト教訓"
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT COUNT(*) FROM review_findings WHERE resolved = 1 AND job_name = "lt";')" = "1"
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT lesson FROM lessons WHERE job_name = "lt";')" = "テスト教訓"
            .claude/totonoe/bin/learn.sh --job-name lt --lesson "更新"
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT COUNT(*) FROM lessons WHERE job_name = "lt";')" = "1"
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT lesson FROM lessons WHERE job_name = "lt";')" = "更新"
            sqlite3 .claude/totonoe/knowledge.db "UPDATE review_findings SET resolved = 0 WHERE job_name = 'lt';"
            .claude/totonoe/bin/learn.sh --job-name lt
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT COUNT(*) FROM review_findings WHERE resolved = 1 AND job_name = "lt";')" = "1"
            .claude/totonoe/bin/init_job.sh --job-name nokn --goal-template feature_loop
            .claude/totonoe/bin/learn.sh --job-name nokn --lesson "nope"
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT COUNT(*) FROM lessons WHERE job_name = "nokn";')" = "0"

            # apply --decision done --lesson E2E
            .claude/totonoe/bin/init_job.sh --job-name lt2 --goal-template feature_loop --with-knowledge --force
            printf 'summary\n' > .claude/totonoe/runtime/lt2/summary.md
            .claude/totonoe/bin/record_claude_round.sh --job-name lt2 --summary-file .claude/totonoe/runtime/lt2/summary.md --changed-file setup.sh --quality-analyze passed --quality-test skipped
            mkdir -p .claude/totonoe/runtime/lt2/rounds/001/snapshot && echo "d" > .claude/totonoe/runtime/lt2/rounds/001/snapshot/setup.sh
            .claude/totonoe/bin/run_reviewer.sh --job-name lt2
            .claude/totonoe/bin/run_judge.sh --job-name lt2
            .claude/totonoe/bin/apply_manager_decision.sh --job-name lt2 --record-spot-check
            .claude/totonoe/bin/apply_manager_decision.sh --job-name lt2 --decision done --lesson "E2E教訓"
            test "$(jq -r '.status' .claude/totonoe/runtime/lt2/state.json)" = "done"
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT lesson FROM lessons WHERE job_name = "lt2";')" = "E2E教訓"

            # done guard → human 降格 → learn 呼ばれない
            cat > "${fake_bin}/codex" <<'FAKESCRIPT2'
#!/usr/bin/env bash
schema_file=""
while [ "$#" -gt 0 ]; do
  case "$1" in --output-schema) schema_file="$2"; shift 2 ;; *) shift ;; esac
done
case "${schema_file}" in
  *reviewer*) echo '{"summary":"bad","overall_grade":"C","critical_count":2,"findings":[{"file":"a.ts","severity":"critical","title":"b1","reason":"r","suggested_fix":"f"},{"file":"b.ts","severity":"critical","title":"b2","reason":"r","suggested_fix":"f"}]}' ;;
  *judge*) echo '{"recommendation":"fix","reason":"要修正","must_fix":["b1"],"can_defer":[],"next_step":"修正","engineer_type":"generic","spot_check_required":false}' ;;
esac
FAKESCRIPT2
            chmod +x "${fake_bin}/codex"
            .claude/totonoe/bin/init_job.sh --job-name lt3 --goal-template feature_loop --with-knowledge --force
            printf 'summary\n' > .claude/totonoe/runtime/lt3/summary.md
            .claude/totonoe/bin/record_claude_round.sh --job-name lt3 --summary-file .claude/totonoe/runtime/lt3/summary.md --changed-file setup.sh --quality-analyze passed --quality-test skipped
            mkdir -p .claude/totonoe/runtime/lt3/rounds/001/snapshot && echo "d" > .claude/totonoe/runtime/lt3/rounds/001/snapshot/setup.sh
            .claude/totonoe/bin/run_reviewer.sh --job-name lt3
            .claude/totonoe/bin/run_judge.sh --job-name lt3
            .claude/totonoe/bin/apply_manager_decision.sh --job-name lt3 --record-spot-check
            .claude/totonoe/bin/apply_manager_decision.sh --job-name lt3 --decision done --lesson "nope"
            test "$(jq -r '.status' .claude/totonoe/runtime/lt3/state.json)" = "human"
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT COUNT(*) FROM lessons WHERE job_name = "lt3";')" = "0"

            # --lesson は --decision done 以外では拒否される
            if .claude/totonoe/bin/apply_manager_decision.sh --job-name lt3 --decision fix --lesson "bad" --force 2>/dev/null; then exit 1; fi
            if .claude/totonoe/bin/apply_manager_decision.sh --job-name lt3 --decision continue --lesson "bad" --force 2>/dev/null; then exit 1; fi

            # query --type lessons
            .claude/totonoe/bin/query_knowledge.sh --type lessons | grep -q "E2E教訓"
            test "$(.claude/totonoe/bin/query_knowledge.sh --type lessons --limit 1 | grep -c '^\-')" = "1"
            .claude/totonoe/bin/query_knowledge.sh --type lessons --max-chars 10 | grep -q "truncated"
          )

      - name: Smoke test shadow status generation
        run: |
          target="$(mktemp -d)"
          ./setup.sh --target "${target}" --force
          (
            cd "${target}"
            jq '.reviewer.mode = "shadow"' .claude/totonoe/config.json > /tmp/_cfg.json && mv /tmp/_cfg.json .claude/totonoe/config.json
            .claude/totonoe/bin/init_job.sh --job-name shadow-smoke --goal-text "shadow ci test"
            printf 'summary\n' > .claude/totonoe/runtime/shadow-smoke/summary.md
            .claude/totonoe/bin/record_claude_round.sh \
              --job-name shadow-smoke \
              --summary-file .claude/totonoe/runtime/shadow-smoke/summary.md \
              --changed-file CLAUDE.totonoe.template.md \
              --quality-analyze passed \
              --quality-test skipped
            round_path=".claude/totonoe/runtime/shadow-smoke/rounds/001"
            source .claude/totonoe/bin/common.sh
            write_shadow_status() {
              local rp="$1"; shift; local entries=("$@")
              if [ "${#entries[@]}" -eq 0 ]; then
                jq -n '{mode: "shadow", batches: []}' > "${rp}/reviewer_shadow_status.json"
                return
              fi
              printf '%s\n' "${entries[@]}" | jq -s '{mode: "shadow", batches: .}' > "${rp}/reviewer_shadow_status.json"
            }
            entries=()
            entries+=("$(jq -nc '{batch:"001",status:"success",provider:"gemini"}')")
            entries+=("$(jq -nc '{batch:"002",status:"skipped",reason:"primary_used_gemini_fallback"}')")
            entries+=("$(jq -nc '{batch:"003",status:"failed",reason:"shadow_execution_failed"}')")
            write_shadow_status "${round_path}" "${entries[@]}"
            sf="${round_path}/reviewer_shadow_status.json"
            test -f "${sf}"
            test "$(jq -r '.mode' "${sf}")" = "shadow"
            test "$(jq '.batches | length' "${sf}")" -eq 3
            test "$(jq -r '.batches[0].status' "${sf}")" = "success"
            test "$(jq -r '.batches[1].status' "${sf}")" = "skipped"
            test "$(jq -r '.batches[1].reason' "${sf}")" = "primary_used_gemini_fallback"
            test "$(jq -r '.batches[2].status' "${sf}")" = "failed"
            test "$(jq -r '.batches[2].reason' "${sf}")" = "shadow_execution_failed"
          )

      - name: Smoke test stale lock recovery (mkdir fallback)
        run: |
          target="$(mktemp -d)"
          ./setup.sh --target "${target}" --force
          (
            cd "${target}"
            export TOTONOE_FORCE_MKDIR_LOCK=1
            .claude/totonoe/bin/init_job.sh --job-name locktest --goal-text "lock ci test"
            lock_dir=".claude/totonoe/runtime/locktest/.job.lock.d"

            # 1. stale lock (dead PID) を作って次回取得で自動回収されることを確認
            mkdir -p "${lock_dir}"
            jq -nc '{pid: 99999999, hostname: "ci", created_at: "2025-01-01T00:00:00Z"}' > "${lock_dir}/owner.json"
            test -d "${lock_dir}"
            printf 'summary\n' > .claude/totonoe/runtime/locktest/summary.md
            .claude/totonoe/bin/record_claude_round.sh \
              --job-name locktest \
              --summary-file .claude/totonoe/runtime/locktest/summary.md \
              --changed-file CLAUDE.totonoe.template.md \
              --quality-analyze passed \
              --quality-test skipped
            status="$(.claude/totonoe/bin/status.sh --job-name locktest --json | jq -r '.status')"
            test "${status}" = "reviewing"
            test ! -d "${lock_dir}"

            # 2. live PID の lock は奪わないことを確認
            mkdir -p "${lock_dir}"
            jq -nc --argjson pid "$$" '{pid: $pid, hostname: "ci", created_at: "2025-01-01T00:00:00Z"}' > "${lock_dir}/owner.json"
            if timeout 3 bash -c "
              cd '${target}'
              export TOTONOE_FORCE_MKDIR_LOCK=1
              source .claude/totonoe/bin/common.sh
              acquire_job_lock locktest
            " 2>/dev/null; then
              echo 'FAIL: live PID lock was stolen' >&2; exit 1
            fi
            rm -rf "${lock_dir}"

            # 3. metadata なしの新しい lock dir (grace period 内) は回収しないことを確認
            mkdir -p "${lock_dir}"
            if timeout 3 bash -c "
              cd '${target}'
              export TOTONOE_FORCE_MKDIR_LOCK=1
              source .claude/totonoe/bin/common.sh
              acquire_job_lock locktest
            " 2>/dev/null; then
              echo 'FAIL: lock without metadata was reclaimed within grace period' >&2; exit 1
            fi
            rm -rf "${lock_dir}"
          )
