name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Validate shell syntax
        run: |
          bash -n setup.sh
          bash -n .claude/totonoe/bin/*.sh

      - name: Validate SQL migrations syntax
        run: |
          for f in .claude/totonoe/migrations/*.sql; do
            sqlite3 ":memory:" ".read ${f}" || { echo "FAIL: ${f}"; exit 1; }
          done

      - name: Validate JSON files
        run: |
          jq . .claude/settings.json >/dev/null
          jq . .claude/totonoe/schemas/judge.schema.json >/dev/null
          jq . .claude/totonoe/schemas/reviewer.schema.json >/dev/null
          jq . .claude/totonoe/config.json >/dev/null

      - name: Smoke test setup and local runtime flow
        run: |
          target="$(mktemp -d)"
          ./setup.sh --target "${target}" --force

          test -f "${target}/.claude/agents/GENERIC-ENGINEER.md"
          test -f "${target}/.claude/agents/SECURITY-ENGINEER.md"
          test -f "${target}/.claude/agents/TEST-ENGINEER.md"
          test -f "${target}/.claude/agents/PERF-ENGINEER.md"
          test -f "${target}/.claude/agents/REFACTOR-ENGINEER.md"
          test -f "${target}/.env.example"

          (
            cd "${target}"
            .claude/totonoe/bin/init_job.sh --job-name smoke --goal-template feature_loop
            .claude/totonoe/bin/pause_job.sh --job-name smoke --reason "ci pause test"
            .claude/totonoe/bin/status.sh --job-name smoke --json >/dev/null
            .claude/totonoe/bin/resume_job.sh --job-name smoke
            printf 'summary\n' > .claude/totonoe/runtime/smoke/summary.md
            .claude/totonoe/bin/record_claude_round.sh \
              --job-name smoke \
              --summary-file .claude/totonoe/runtime/smoke/summary.md \
              --changed-file CLAUDE.totonoe.template.md \
              --quality-analyze passed \
              --quality-test skipped
            .claude/totonoe/bin/status.sh --job-name smoke --json --provider-state >/dev/null
          )

      - name: Smoke test knowledge DB initialization
        run: |
          target="$(mktemp -d)"
          ./setup.sh --target "${target}" --force
          (
            cd "${target}"

            # init_knowledge.sh で knowledge.db を作成する
            .claude/totonoe/bin/init_knowledge.sh

            # knowledge.db が作成されていること
            test -f .claude/totonoe/knowledge.db

            # schema_version が 1 であること
            ver="$(sqlite3 .claude/totonoe/knowledge.db 'SELECT MAX(version) FROM schema_version;')"
            test "${ver}" = "1"

            # 全テーブルが存在すること
            tables="$(sqlite3 .claude/totonoe/knowledge.db ".tables")"
            echo "${tables}" | grep -q "review_rounds"
            echo "${tables}" | grep -q "review_findings"
            echo "${tables}" | grep -q "verdicts"
            echo "${tables}" | grep -q "schema_version"

            # review_findings に resolved カラムが存在すること
            sqlite3 .claude/totonoe/knowledge.db "SELECT resolved FROM review_findings LIMIT 0;"

            # journal_mode が WAL であること
            mode="$(sqlite3 .claude/totonoe/knowledge.db 'PRAGMA journal_mode;')"
            test "${mode}" = "wal"

            # 冪等性: 再実行してもエラーにならないこと
            .claude/totonoe/bin/init_knowledge.sh

            # --force で再作成できること
            .claude/totonoe/bin/init_knowledge.sh --force
            ver2="$(sqlite3 .claude/totonoe/knowledge.db 'SELECT MAX(version) FROM schema_version;')"
            test "${ver2}" = "1"
          )

      - name: Smoke test knowledge write layer
        run: |
          target="$(mktemp -d)"
          ./setup.sh --target "${target}" --force

          # fake codex を PATH に差し込む
          fake_bin="$(mktemp -d)"
          cat > "${fake_bin}/codex" <<'FAKESCRIPT'
#!/usr/bin/env bash
schema_file=""
while [ "$#" -gt 0 ]; do
  case "$1" in --output-schema) schema_file="$2"; shift 2 ;; *) shift ;; esac
done
case "${schema_file}" in
  *reviewer*)
    cat <<JSON
{"summary":"CI reviewer test","overall_grade":"${FAKE_GRADE:-A}","critical_count":1,"findings":[{"file":"src/app.ts","severity":"critical","title":"テスト指摘","reason":"テスト理由","suggested_fix":"修正案"}]}
JSON
    ;;
  *judge*)
    cat <<JSON
{"recommendation":"fix","reason":"修正必要","must_fix":["テスト指摘"],"can_defer":[],"next_step":"修正する","engineer_type":"generic","spot_check_required":false}
JSON
    ;;
esac
FAKESCRIPT
          chmod +x "${fake_bin}/codex"
          export PATH="${fake_bin}:${PATH}"

          (
            cd "${target}"

            # 1. --with-knowledge で knowledge.db + state.json が正しく設定される
            .claude/totonoe/bin/init_job.sh --job-name write-test --goal-template feature_loop --with-knowledge
            test -f .claude/totonoe/knowledge.db
            test "$(jq -r '.knowledge_enabled' .claude/totonoe/runtime/write-test/state.json)" = "true"

            # --with-knowledge なしでは false
            .claude/totonoe/bin/init_job.sh --job-name no-kn --goal-template feature_loop
            test "$(jq -r '.knowledge_enabled' .claude/totonoe/runtime/no-kn/state.json)" = "false"

            # 2. reviewer → review_rounds + review_findings に書き込まれる
            printf 'summary\n' > .claude/totonoe/runtime/write-test/summary.md
            .claude/totonoe/bin/record_claude_round.sh \
              --job-name write-test \
              --summary-file .claude/totonoe/runtime/write-test/summary.md \
              --changed-file setup.sh \
              --quality-analyze passed \
              --quality-test skipped
            rp=".claude/totonoe/runtime/write-test/rounds/001"
            mkdir -p "${rp}/snapshot"
            echo "dummy" > "${rp}/snapshot/setup.sh"
            .claude/totonoe/bin/run_reviewer.sh --job-name write-test

            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT COUNT(*) FROM review_rounds;')" = "1"
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT overall_grade FROM review_rounds;')" = "A"
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT COUNT(*) FROM review_findings;')" = "1"
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT severity FROM review_findings;')" = "critical"

            # 3. judge → verdicts に書き込まれる
            .claude/totonoe/bin/run_judge.sh --job-name write-test
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT COUNT(*) FROM verdicts;')" = "1"
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT recommendation FROM verdicts;')" = "fix"
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT engineer_type FROM verdicts;')" = "generic"

            # 4. --force 再実行で重複しない
            .claude/totonoe/bin/run_reviewer.sh --job-name write-test --force
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT COUNT(*) FROM review_rounds;')" = "1"
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT COUNT(*) FROM review_findings;')" = "1"
            .claude/totonoe/bin/run_judge.sh --job-name write-test --force
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT COUNT(*) FROM verdicts;')" = "1"

            # 5. グレード C は保存されない
            export FAKE_GRADE="C"
            jq '.status = "init" | .current_round = 0' .claude/totonoe/runtime/write-test/state.json > /tmp/_st.json
            mv /tmp/_st.json .claude/totonoe/runtime/write-test/state.json
            printf 'summary\n' > .claude/totonoe/runtime/write-test/summary.md
            .claude/totonoe/bin/record_claude_round.sh \
              --job-name write-test \
              --summary-file .claude/totonoe/runtime/write-test/summary.md \
              --changed-file setup.sh \
              --quality-analyze passed \
              --quality-test skipped
            rp2=".claude/totonoe/runtime/write-test/rounds/002"
            mkdir -p "${rp2}/snapshot"
            echo "dummy" > "${rp2}/snapshot/setup.sh"
            .claude/totonoe/bin/run_reviewer.sh --job-name write-test
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT COUNT(*) FROM review_rounds;')" = "1"

            # 6. 初期蓄積フェーズではグレード B が保存される
            export FAKE_GRADE="B"
            jq '.status = "init" | .current_round = 0' .claude/totonoe/runtime/write-test/state.json > /tmp/_st.json
            mv /tmp/_st.json .claude/totonoe/runtime/write-test/state.json
            printf 'summary\n' > .claude/totonoe/runtime/write-test/summary.md
            .claude/totonoe/bin/record_claude_round.sh \
              --job-name write-test \
              --summary-file .claude/totonoe/runtime/write-test/summary.md \
              --changed-file setup.sh \
              --quality-analyze passed \
              --quality-test skipped
            rp3=".claude/totonoe/runtime/write-test/rounds/003"
            mkdir -p "${rp3}/snapshot"
            echo "dummy" > "${rp3}/snapshot/setup.sh"
            .claude/totonoe/bin/run_reviewer.sh --job-name write-test
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT COUNT(*) FROM review_rounds WHERE overall_grade = "B";')" = "1"

            # 7. 閾値以上ではグレード B が保存されない
            jq '.knowledge.quality_threshold_count = 1' .claude/totonoe/config.json > /tmp/_cfg.json
            mv /tmp/_cfg.json .claude/totonoe/config.json
            jq '.status = "init" | .current_round = 0' .claude/totonoe/runtime/write-test/state.json > /tmp/_st.json
            mv /tmp/_st.json .claude/totonoe/runtime/write-test/state.json
            printf 'summary\n' > .claude/totonoe/runtime/write-test/summary.md
            .claude/totonoe/bin/record_claude_round.sh \
              --job-name write-test \
              --summary-file .claude/totonoe/runtime/write-test/summary.md \
              --changed-file setup.sh \
              --quality-analyze passed \
              --quality-test skipped
            rp4=".claude/totonoe/runtime/write-test/rounds/004"
            mkdir -p "${rp4}/snapshot"
            echo "dummy" > "${rp4}/snapshot/setup.sh"
            .claude/totonoe/bin/run_reviewer.sh --job-name write-test
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT COUNT(*) FROM review_rounds WHERE overall_grade = "B";')" = "1"

            # 8. findings=[] でも review_rounds は保存される
            jq '.knowledge.quality_threshold_count = 20' .claude/totonoe/config.json > /tmp/_cfg.json
            mv /tmp/_cfg.json .claude/totonoe/config.json
            cat > "${fake_bin}/codex" <<'FAKESCRIPT2'
#!/usr/bin/env bash
schema_file=""
while [ "$#" -gt 0 ]; do
  case "$1" in --output-schema) schema_file="$2"; shift 2 ;; *) shift ;; esac
done
case "${schema_file}" in
  *reviewer*) echo '{"summary":"完璧","overall_grade":"S","critical_count":0,"findings":[]}' ;;
  *judge*) echo '{"recommendation":"done","reason":"完了","must_fix":[],"can_defer":[],"next_step":"なし","engineer_type":"generic","spot_check_required":false}' ;;
esac
FAKESCRIPT2
            chmod +x "${fake_bin}/codex"
            jq '.status = "init" | .current_round = 0' .claude/totonoe/runtime/write-test/state.json > /tmp/_st.json
            mv /tmp/_st.json .claude/totonoe/runtime/write-test/state.json
            printf 'summary\n' > .claude/totonoe/runtime/write-test/summary.md
            .claude/totonoe/bin/record_claude_round.sh \
              --job-name write-test \
              --summary-file .claude/totonoe/runtime/write-test/summary.md \
              --changed-file setup.sh \
              --quality-analyze passed \
              --quality-test skipped
            rp5=".claude/totonoe/runtime/write-test/rounds/005"
            mkdir -p "${rp5}/snapshot"
            echo "dummy" > "${rp5}/snapshot/setup.sh"
            .claude/totonoe/bin/run_reviewer.sh --job-name write-test
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT COUNT(*) FROM review_rounds WHERE overall_grade = "S";')" -ge 1
            test "$(sqlite3 .claude/totonoe/knowledge.db "SELECT COUNT(*) FROM review_findings WHERE review_round_id = (SELECT id FROM review_rounds WHERE overall_grade = 'S' ORDER BY id DESC LIMIT 1);")" = "0"

            # 9. knowledge 無効ジョブは reviewer/judge がエラーにならない
            printf 'summary\n' > .claude/totonoe/runtime/no-kn/summary.md
            .claude/totonoe/bin/record_claude_round.sh \
              --job-name no-kn \
              --summary-file .claude/totonoe/runtime/no-kn/summary.md \
              --changed-file setup.sh \
              --quality-analyze passed \
              --quality-test skipped
            rp_nk=".claude/totonoe/runtime/no-kn/rounds/001"
            mkdir -p "${rp_nk}/snapshot"
            echo "dummy" > "${rp_nk}/snapshot/setup.sh"
            .claude/totonoe/bin/run_reviewer.sh --job-name no-kn
            .claude/totonoe/bin/run_judge.sh --job-name no-kn
          )

      - name: Smoke test shadow status generation
        run: |
          target="$(mktemp -d)"
          ./setup.sh --target "${target}" --force
          (
            cd "${target}"
            # shadow mode を有効にする
            jq '.reviewer.mode = "shadow"' .claude/totonoe/config.json > /tmp/_cfg.json && mv /tmp/_cfg.json .claude/totonoe/config.json

            .claude/totonoe/bin/init_job.sh --job-name shadow-smoke --goal-text "shadow ci test"
            printf 'summary\n' > .claude/totonoe/runtime/shadow-smoke/summary.md
            .claude/totonoe/bin/record_claude_round.sh \
              --job-name shadow-smoke \
              --summary-file .claude/totonoe/runtime/shadow-smoke/summary.md \
              --changed-file CLAUDE.totonoe.template.md \
              --quality-analyze passed \
              --quality-test skipped

            round_path=".claude/totonoe/runtime/shadow-smoke/rounds/001"

            # write_shadow_status の 3 パターンを検証する
            source .claude/totonoe/bin/common.sh
            write_shadow_status() {
              local rp="$1"; shift; local entries=("$@")
              if [ "${#entries[@]}" -eq 0 ]; then
                jq -n '{mode: "shadow", batches: []}' > "${rp}/reviewer_shadow_status.json"
                return
              fi
              printf '%s\n' "${entries[@]}" | jq -s '{mode: "shadow", batches: .}' > "${rp}/reviewer_shadow_status.json"
            }

            entries=()
            entries+=("$(jq -nc '{batch:"001",status:"success",provider:"gemini"}')")
            entries+=("$(jq -nc '{batch:"002",status:"skipped",reason:"primary_used_gemini_fallback"}')")
            entries+=("$(jq -nc '{batch:"003",status:"failed",reason:"shadow_execution_failed"}')")
            write_shadow_status "${round_path}" "${entries[@]}"

            sf="${round_path}/reviewer_shadow_status.json"
            test -f "${sf}"
            test "$(jq -r '.mode' "${sf}")" = "shadow"
            test "$(jq '.batches | length' "${sf}")" -eq 3
            test "$(jq -r '.batches[0].status' "${sf}")" = "success"
            test "$(jq -r '.batches[1].status' "${sf}")" = "skipped"
            test "$(jq -r '.batches[1].reason' "${sf}")" = "primary_used_gemini_fallback"
            test "$(jq -r '.batches[2].status' "${sf}")" = "failed"
            test "$(jq -r '.batches[2].reason' "${sf}")" = "shadow_execution_failed"
          )

      - name: Smoke test stale lock recovery (mkdir fallback)
        run: |
          target="$(mktemp -d)"
          ./setup.sh --target "${target}" --force
          (
            cd "${target}"
            export TOTONOE_FORCE_MKDIR_LOCK=1

            .claude/totonoe/bin/init_job.sh --job-name locktest --goal-text "lock ci test"

            lock_dir=".claude/totonoe/runtime/locktest/.job.lock.d"

            # 1. stale lock (dead PID) を作って次回取得で自動回収されることを確認
            mkdir -p "${lock_dir}"
            jq -nc '{pid: 99999999, hostname: "ci", created_at: "2025-01-01T00:00:00Z"}' > "${lock_dir}/owner.json"
            test -d "${lock_dir}"

            printf 'summary\n' > .claude/totonoe/runtime/locktest/summary.md
            .claude/totonoe/bin/record_claude_round.sh \
              --job-name locktest \
              --summary-file .claude/totonoe/runtime/locktest/summary.md \
              --changed-file CLAUDE.totonoe.template.md \
              --quality-analyze passed \
              --quality-test skipped

            status="$(.claude/totonoe/bin/status.sh --job-name locktest --json | jq -r '.status')"
            test "${status}" = "reviewing"
            test ! -d "${lock_dir}"

            # 2. live PID の lock は奪わないことを確認
            mkdir -p "${lock_dir}"
            jq -nc --argjson pid "$$" '{pid: $pid, hostname: "ci", created_at: "2025-01-01T00:00:00Z"}' > "${lock_dir}/owner.json"

            if timeout 3 bash -c "
              cd '${target}'
              export TOTONOE_FORCE_MKDIR_LOCK=1
              source .claude/totonoe/bin/common.sh
              acquire_job_lock locktest
            " 2>/dev/null; then
              echo 'FAIL: live PID lock was stolen' >&2
              exit 1
            fi
            rm -rf "${lock_dir}"

            # 3. metadata なしの新しい lock dir (grace period 内) は回収しないことを確認
            mkdir -p "${lock_dir}"
            # owner.json を置かない — grace period 内なので回収されないはず

            if timeout 3 bash -c "
              cd '${target}'
              export TOTONOE_FORCE_MKDIR_LOCK=1
              source .claude/totonoe/bin/common.sh
              acquire_job_lock locktest
            " 2>/dev/null; then
              echo 'FAIL: lock without metadata was reclaimed within grace period' >&2
              exit 1
            fi
            rm -rf "${lock_dir}"
          )
