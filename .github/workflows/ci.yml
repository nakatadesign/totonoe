            .claude/totonoe/bin/run_reviewer.sh --job-name write-test
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT COUNT(*) FROM review_rounds WHERE overall_grade = "B" AND round = 6;')" = "1"
            jq '.knowledge.quality_threshold_count = 1' .claude/totonoe/config.json > /tmp/_cfg.json && mv /tmp/_cfg.json .claude/totonoe/config.json
