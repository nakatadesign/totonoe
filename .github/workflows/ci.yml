            export FAKE_GRADE="A"
            .claude/totonoe/bin/run_reviewer.sh --job-name write-test --force
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT COUNT(*) FROM review_rounds WHERE overall_grade = "A" AND round = 6;')" = "1"
            export FAKE_GRADE="C"
            .claude/totonoe/bin/run_reviewer.sh --job-name write-test --force
            test "$(sqlite3 .claude/totonoe/knowledge.db 'SELECT COUNT(*) FROM review_rounds WHERE round = 6;')" = "0"

            # 11. threshold 不正値で warn + fallback
            jq '.knowledge.quality_threshold_count = "bad"' .claude/totonoe/config.json > /tmp/_cfg.json && mv /tmp/_cfg.json .claude/totonoe/config.json
            export FAKE_GRADE="A"
            .claude/totonoe/bin/run_reviewer.sh --job-name write-test --force 2>&1 | grep -q "不正です"
            jq '.knowledge.quality_threshold_count = 20' .claude/totonoe/config.json > /tmp/_cfg.json && mv /tmp/_cfg.json .claude/totonoe/config.json
          )

